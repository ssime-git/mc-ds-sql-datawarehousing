services:
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db:ro
    environment:
      DB_PATH: /app/db/census.db

  app:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
